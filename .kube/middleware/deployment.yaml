apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware-gateway
  namespace: inference-engine
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: middleware-gateway
  template:
    metadata:
      labels:
        app: middleware-gateway
    spec:
      nodeSelector:
        inference-node: debian
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: middleware
        image: ghcr.io/englios/openai-llm-gateway:latest
        imagePullPolicy: IfNotPresent
        workingDir: /app
        command: [ "uvicorn" ]
        args: [ "app:app", "--host", "0.0.0.0", "--port", "8080" ]
        envFrom:
        - configMapRef:
            name: inference-engine-config
        env:
        - name: INTERNAL_LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: VLLM_API_KEY
        - name: MIDDLEWARE_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: MIDDLEWARE_API_KEY
              optional: true
        - name: UPSTREAM_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: MIDDLEWARE_UPSTREAM_BASE_URL
              optional: true
        - name: REQUEST_TIMEOUT_SECONDS
          value: "120"
        - name: SYSTEM_PROMPT
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: SYSTEM_PROMPT
              optional: true
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 6
