apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware-gateway
  namespace: inference-engine
spec:
  replicas: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: middleware-gateway
  template:
    metadata:
      labels:
        app: middleware-gateway
    spec:
      terminationGracePeriodSeconds: 30
      nodeSelector:
        inference-node: debian
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: middleware
        image: ghcr.io/englios/openai-llm-gateway@sha256:71804999f2af578039307b7e7fe211e2b9c83a72e1c846cbb2d4c4392846558c
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        workingDir: /app
        command: [ "uvicorn" ]
        args: [ "app:app", "--host", "0.0.0.0", "--port", "8080" ]
        envFrom:
        - configMapRef:
            name: inference-engine-config
        env:
        - name: INTERNAL_LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys-secret
              key: LLM_API_KEY
        - name: MIDDLEWARE_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys-secret
              key: MIDDLEWARE_API_KEY
              optional: true
        - name: MIDDLEWARE_API_KEYS
          valueFrom:
            secretKeyRef:
              name: api-keys-secret
              key: MIDDLEWARE_API_KEYS
              optional: true
        - name: UPSTREAM_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: MIDDLEWARE_UPSTREAM_BASE_URL
              optional: true
        - name: REQUEST_TIMEOUT_SECONDS
          value: "120"
        - name: SYSTEM_PROMPT
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: SYSTEM_PROMPT
              optional: true
        ports:
        - containerPort: 8080
        lifecycle:
          preStop:
            exec:
              command: [ "sh", "-c", "sleep 10" ]
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 6
