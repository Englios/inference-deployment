apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamacpp-server
  namespace: inference-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llamacpp-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: llamacpp-server
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        inference-node: pop-os
      containers:
      - name: llamacpp
        image: ghcr.io/ggml-org/llama.cpp:server-cuda
        imagePullPolicy: IfNotPresent
        command: [ "/bin/sh", "-c" ]
        args:
        - >-
          llama-server -m "$LLAMACPP_MODEL_FILE" --host 0.0.0.0 --port "$INFERENCE_PORT" --ctx-size "$LLAMACPP_CTX_SIZE" --n-gpu-layers "$LLAMACPP_N_GPU_LAYERS" --parallel "$LLAMACPP_PARALLEL" --api-key "$VLLM_API_KEY"
        envFrom:
        - configMapRef:
            name: inference-engine-config
        env:
        - name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: VLLM_API_KEY
        ports:
        - containerPort: 8000
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 120
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        resources:
          requests:
            nvidia.com/gpu: "1"
            cpu: "4"
            memory: "12Gi"
          limits:
            nvidia.com/gpu: "1"
            cpu: "8"
            memory: "24Gi"
        volumeMounts:
        - name: model-cache
          mountPath: /models
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: vllm-model-cache
