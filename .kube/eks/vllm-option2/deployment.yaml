apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-server
  namespace: inference-engine
spec:
  serviceName: vllm-headless
  podManagementPolicy: Parallel
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      terminationGracePeriodSeconds: 120
      nodeSelector:
        accelerator: nvidia-gpu
        workload: inference
      tolerations:
      - key: dedicated
        operator: Equal
        value: inference
        effect: NoSchedule
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.16.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - >-
          vllm serve "$VLLM_MODEL"
          --host 0.0.0.0
          --port "$INFERENCE_PORT"
          --download-dir /models
          --api-key "$VLLM_API_KEY"
          --tensor-parallel-size "$VLLM_TENSOR_PARALLEL_SIZE"
          --reasoning-parser "$VLLM_REASONING_PARSER"
          --dtype "$VLLM_DTYPE"
          --gpu-memory-utilization "$VLLM_GPU_MEMORY_UTILIZATION"
          --max-model-len "$VLLM_MAX_MODEL_LEN"
          --max-num-seqs "$VLLM_MAX_NUM_SEQS"
          --enable-prefix-caching
        envFrom:
        - configMapRef:
            name: inference-engine-config
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: HF_TOKEN
        - name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: VLLM_API_KEY
        ports:
        - containerPort: 8000
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 240
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -lc
            - python3 -c 'import json,os,sys,urllib.request; model=os.environ.get("VLLM_MODEL",""); port=os.environ.get("INFERENCE_PORT","8000"); key=os.environ.get("VLLM_API_KEY",""); req=urllib.request.Request(f"http://127.0.0.1:{port}/v1/models", headers={"Authorization": f"Bearer {key}"}); data=json.loads(urllib.request.urlopen(req, timeout=3).read().decode()); ids=[x.get("id","") for x in data.get("data",[])]; sys.exit(0 if (not model or any(model in i or i in model for i in ids)) else 1)'
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        resources:
          requests:
            nvidia.com/gpu: "4"
            cpu: "32"
            memory: "128Gi"
          limits:
            nvidia.com/gpu: "4"
            cpu: "48"
            memory: "192Gi"
        volumeMounts:
        - name: model-cache
          mountPath: /models
  volumeClaimTemplates:
  - metadata:
      name: model-cache
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: gp3
      resources:
        requests:
          storage: 200Gi
