apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-engine-config
  namespace: inference-engine
data:
  INFERENCE_PORT: "8000"
  SYSTEM_PROMPT: "You are a helpful assistant. Follow safety and policy instructions."
  MIDDLEWARE_UPSTREAM_BASE_URL: "http://llm-service.inference-engine.svc.cluster.local"
  VLLM_MODEL: "Qwen/Qwen3.5-27B"
  VLLM_TENSOR_PARALLEL_SIZE: "4"
  VLLM_REASONING_PARSER: "qwen3"
  VLLM_DTYPE: "bfloat16"
  VLLM_MAX_MODEL_LEN: "131072"
  VLLM_MAX_NUM_SEQS: "4"
  VLLM_GPU_MEMORY_UTILIZATION: "0.90"
