apiVersion: ray.io/v1
kind: RayService
metadata:
  name: ray-vllm-122b-a10b-tp4
  namespace: inference-engine
spec:
  serveConfigV2: |
    applications:
    - name: llms
      import_path: ray.serve.llm:build_openai_app
      route_prefix: "/"
      args:
        llm_configs:
        - model_loading_config:
            model_id: qwen3.5-122b-a10b
            model_source: Qwen/Qwen3.5-122B-A10B
          engine_kwargs:
            distributed_executor_backend: ray
            tensor_parallel_size: 4
            pipeline_parallel_size: 1
            max_model_len: 131072
            gpu_memory_utilization: 0.85
            reasoning_parser: qwen3
          deployment_config:
            autoscaling_config:
              min_replicas: 1
              max_replicas: 1
              target_ongoing_requests: 4
            max_ongoing_requests: 8
  rayClusterConfig:
    rayVersion: "2.52.0"
    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        num-gpus: "0"
      template:
        spec:
          nodeSelector:
            workload: system
          containers:
          - name: ray-head
            image: rayproject/ray-llm:2.52.0-py311-cu128
            ports:
            - containerPort: 8000
              name: serve
            - containerPort: 6379
              name: gcs
            - containerPort: 8265
              name: dashboard
            - containerPort: 10001
              name: client
            resources:
              limits:
                cpu: "2"
                memory: "4Gi"
              requests:
                cpu: "1"
                memory: "2Gi"
    workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 4
      minReplicas: 4
      maxReplicas: 4
      numOfHosts: 1
      rayStartParams:
        num-gpus: "1"
      template:
        spec:
          nodeSelector:
            accelerator: nvidia-gpu
            workload: inference
          tolerations:
          - key: dedicated
            operator: Equal
            value: inference
            effect: NoSchedule
          containers:
          - name: ray-worker
            image: rayproject/ray-llm:2.52.0-py311-cu128
            env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ray-vllm-secrets
                  key: HF_TOKEN
            resources:
              limits:
                cpu: "16"
                memory: "64Gi"
                nvidia.com/gpu: "1"
              requests:
                cpu: "8"
                memory: "48Gi"
                nvidia.com/gpu: "1"
