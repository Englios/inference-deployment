apiVersion: ray.io/v1
kind: RayService
metadata:
  name: ray-vllm
  namespace: inference-engine
spec:
  serveConfigV2: |
    applications:
    - name: llms
      import_path: ray.serve.llm:build_openai_app
      route_prefix: "/"
      args:
        llm_configs:
        - model_loading_config:
            model_id: qwen2.5-14b-instruct
            model_source: Qwen/Qwen2.5-14B-Instruct
          engine_kwargs:
            distributed_executor_backend: ray
            tensor_parallel_size: 2
            pipeline_parallel_size: 1
            max_model_len: 2048
            gpu_memory_utilization: 0.85
          deployment_config:
            autoscaling_config:
              min_replicas: 1
              max_replicas: 1
              target_ongoing_requests: 8
            max_ongoing_requests: 16
  rayClusterConfig:
    rayVersion: "2.52.0"
    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        num-gpus: "0"
      template:
        spec:
          nodeSelector:
            workload: system
          containers:
          - name: ray-head
            image: rayproject/ray-llm:2.52.0-py311-cu128
            ports:
            - containerPort: 8000
              name: serve
            - containerPort: 6379
              name: gcs
            - containerPort: 8265
              name: dashboard
            - containerPort: 10001
              name: client
            resources:
              limits:
                cpu: "2"
                memory: "4Gi"
              requests:
                cpu: "1"
                memory: "2Gi"
    workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 2
      numOfHosts: 1
      rayStartParams:
        num-gpus: "1"
      template:
        spec:
          nodeSelector:
            accelerator: nvidia-gpu
            workload: inference
          tolerations:
          - key: dedicated
            operator: Equal
            value: inference
            effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                  - key: ray.io/group
                    operator: In
                    values:
                    - gpu-workers
                topologyKey: kubernetes.io/hostname
          containers:
          - name: ray-worker
            image: rayproject/ray-llm:2.52.0-py311-cu128
            env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ray-vllm-secrets
                  key: HF_TOKEN
            resources:
              limits:
                cpu: "4"
                memory: "14Gi"
                nvidia.com/gpu: "1"
              requests:
                cpu: "2"
                memory: "10Gi"
                nvidia.com/gpu: "1"
