apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: inference-engine
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        inference-node: pop-os
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.16.0
        imagePullPolicy: IfNotPresent
        command: [ "/bin/sh", "-c" ]
        args:
        - >
          vllm serve "$VLLM_MODEL" --host 0.0.0.0 --port "$INFERENCE_PORT" --download-dir /models --api-key "$VLLM_API_KEY" --gpu-memory-utilization "$VLLM_GPU_MEMORY_UTILIZATION" --max-model-len "$VLLM_MAX_MODEL_LEN" --max-num-seqs "$VLLM_MAX_NUM_SEQS"
        envFrom:
        - configMapRef:
            name: inference-engine-config
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: HF_TOKEN
        - name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-secrets
              key: VLLM_API_KEY
        ports:
        - containerPort: 8000
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 120
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -lc
            - |
              python3 -c 'import json,os,sys,urllib.request; model=os.environ.get("VLLM_MODEL",""); port=os.environ.get("INFERENCE_PORT","8000"); key=os.environ.get("VLLM_API_KEY",""); req=urllib.request.Request(f"http://127.0.0.1:{port}/v1/models", headers={"Authorization": f"Bearer {key}"}); data=json.loads(urllib.request.urlopen(req, timeout=3).read().decode()); ids=[x.get("id","") for x in data.get("data",[])]; sys.exit(0 if (not model or any(model in i or i in model for i in ids)) else 1)'
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        resources:
          requests:
            nvidia.com/gpu: "1"
            cpu: "4"
            memory: "16Gi"
          limits:
            nvidia.com/gpu: "1"
            cpu: "8"
            memory: "32Gi"
        volumeMounts:
        - name: model-cache
          mountPath: /models
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: vllm-model-cache
