apiVersion: batch/v1
kind: Job
metadata:
  name: model-download
  namespace: inference-engine
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: model-download
    spec:
      nodeSelector:
        inference-node: pop-os
      restartPolicy: Never
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
      - name: model-download
        image: astral/uv:python3.12-bookworm-slim
        command: [ "sh", "-c" ]
        envFrom:
        - configMapRef:
            name: inference-engine-config
        - secretRef:
            name: api-keys-secret
        env:
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: MODEL_DOWNLOAD_NAME
        - name: HF_HOME
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: HF_HOME
        - name: HF_HUB_ENABLE_HF_TRANSFER
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: HF_HUB_ENABLE_HF_TRANSFER
        - name: MODEL_REVISION
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: MODEL_DOWNLOAD_REVISION
        - name: MODEL_DOWNLOAD_QUANTIZATION
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: MODEL_DOWNLOAD_QUANTIZATION
              optional: true
        - name: MODEL_DOWNLOAD_FILE
          valueFrom:
            configMapKeyRef:
              name: inference-engine-config
              key: MODEL_DOWNLOAD_FILE
              optional: true
        args:
        - |
          set -eux
          uv pip install --system --no-cache-dir "huggingface_hub[hf_transfer]>=0.32.0"
          if [ -n "${MODEL_DOWNLOAD_FILE:-}" ]; then
            hf download "$MODEL_NAME" "$MODEL_DOWNLOAD_FILE" --revision "$MODEL_REVISION"
          elif [ -n "${MODEL_DOWNLOAD_QUANTIZATION:-}" ]; then
            hf download "$MODEL_NAME" --revision "$MODEL_REVISION" --include "*${MODEL_DOWNLOAD_QUANTIZATION}*"
          else
            hf download "$MODEL_NAME" --revision "$MODEL_REVISION"
          fi
        volumeMounts:
        - name: model-cache
          mountPath: /home/.cache/huggingface
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
