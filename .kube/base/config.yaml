apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-engine-config
  namespace: inference-engine
data:
  INFERENCE_PORT: "8000"
  SYSTEM_PROMPT: "You are a helpful assistant. Follow safety and policy instructions."
  MIDDLEWARE_UPSTREAM_BASE_URL: "http://llm-service.inference-engine.svc.cluster.local"

  VLLM_MODEL: "Qwen/Qwen2.5-3B-Instruct"
  VLLM_MAX_MODEL_LEN: "20K"
  VLLM_GPU_MEMORY_UTILIZATION: "0.70"
  VLLM_MAX_NUM_SEQS: "16"

  SGLANG_MODEL_PATH: "Qwen/Qwen2.5-3B-Instruct"
  SGLANG_CONTEXT_LENGTH: "2048"
  SGLANG_MEM_FRACTION_STATIC: "0.80"

  LLAMACPP_MODEL_FILE: "/models/llamacpp/model.gguf"
  LLAMACPP_CTX_SIZE: "4096"
  LLAMACPP_N_GPU_LAYERS: "999"
  LLAMACPP_PARALLEL: "2"
