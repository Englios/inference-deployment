apiVersion: ray.io/v1
kind: RayService
metadata:
  name: ray-vllm
  namespace: inference-engine
spec:
  serveConfigV2: |
    applications:
    - name: llms
      import_path: ray.serve.llm:build_openai_app
      route_prefix: "/"
      args:
        llm_configs:
        - model_loading_config:
            model_id: gpt-oss-120b
            model_source: openai/gpt-oss-120b
          engine_kwargs:
            distributed_executor_backend: ray
            tensor_parallel_size: 2
            pipeline_parallel_size: 2
            max_model_len: 32768
            gpu_memory_utilization: 0.85
          deployment_config:
            autoscaling_config:
              min_replicas: 1
              max_replicas: 1
              target_ongoing_requests: 4
            max_ongoing_requests: 8
            health_check_period_s: 30
            health_check_timeout_s: 900
            graceful_shutdown_timeout_s: 120
            graceful_shutdown_wait_loop_s: 10
      runtime_env:
        pip:
        - transformers==4.57.0
        env_vars:
          VLLM_ALLREDUCE_USE_SYMM_MEM: "0"
  rayClusterConfig:
    rayVersion: "2.52.0"
    headGroupSpec:
      rayStartParams:
        num-cpus: "8"
        num-gpus: "2"
      template:
        spec:
          nodeSelector:
            accelerator: nvidia-gpu
            workload: inference
          tolerations:
          - key: dedicated
            operator: Equal
            value: inference
            effect: NoSchedule
          containers:
          - name: ray-head
            image: anyscale/ray-llm:2.54.0-py311-cu128
            ports:
            - containerPort: 8000
              name: serve
            - containerPort: 6379
              name: gcs
            - containerPort: 8265
              name: dashboard
            - containerPort: 10001
              name: client
            resources:
              limits:
                cpu: "16"
                memory: "64Gi"
                nvidia.com/gpu: "2"
              requests:
                cpu: "8"
                memory: "48Gi"
                nvidia.com/gpu: "2"
    workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 1
      minReplicas: 1
      maxReplicas: 1
      numOfHosts: 1
      rayStartParams:
        num-gpus: "2"
      template:
        spec:
          nodeSelector:
            accelerator: nvidia-gpu
            workload: inference
          tolerations:
          - key: dedicated
            operator: Equal
            value: inference
            effect: NoSchedule
          containers:
          - name: ray-worker
            image: anyscale/ray-llm:2.54.0-py311-cu128
            env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ray-vllm-secrets
                  key: HF_TOKEN
            resources:
              limits:
                cpu: "16"
                memory: "64Gi"
                nvidia.com/gpu: "2"
              requests:
                cpu: "8"
                memory: "48Gi"
                nvidia.com/gpu: "2"
