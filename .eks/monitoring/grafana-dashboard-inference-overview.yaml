apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-inference-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  inference-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", pod=~\"$pod\"}[5m]))",
              "refId": "A"
            }
          ],
          "title": "CPU Usage (cores)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"$namespace\", pod=~\"$pod\"})",
              "refId": "A"
            }
          ],
          "title": "Memory Working Set (bytes)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 3,
          "targets": [
            {
              "expr": "sum(DCGM_FI_DEV_GPU_UTIL{namespace=~\"$namespace\"}) by (pod)",
              "refId": "A"
            }
          ],
          "title": "GPU Utilization by Pod (%)",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["inference", "kubernetes", "gpu"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "inference-engine", "value": "inference-engine"},
            "datasource": "Prometheus",
            "definition": "label_values(kube_pod_info, namespace)",
            "includeAll": true,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "query": {"query": "label_values(kube_pod_info, namespace)", "refId": "Prom-NS"},
            "refresh": 1,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {"selected": false, "text": "All", "value": "$__all"},
            "datasource": "Prometheus",
            "definition": "label_values(kube_pod_info{namespace=~\"$namespace\"}, pod)",
            "includeAll": true,
            "label": "Pod",
            "multi": true,
            "name": "pod",
            "query": {"query": "label_values(kube_pod_info{namespace=~\"$namespace\"}, pod)", "refId": "Prom-Pod"},
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "Inference Overview",
      "uid": "inference-overview",
      "version": 1
    }
