apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-network-comparison
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  network-comparison.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "sum(rate(container_network_receive_bytes_total{namespace=~\"$namespace\",pod=~\"$pod\"}[2m]))", "refId": "A"}],
          "title": "Pod Receive Throughput (bytes/s)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [{"expr": "sum(rate(container_network_transmit_bytes_total{namespace=~\"$namespace\",pod=~\"$pod\"}[2m]))", "refId": "A"}],
          "title": "Pod Transmit Throughput (bytes/s)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "targets": [{"expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*\"}[2m])) by (instance)", "refId": "A"}],
          "title": "Node Receive Throughput by Node (bytes/s)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "targets": [{"expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*\"}[2m])) by (instance)", "refId": "A"}],
          "title": "Node Transmit Throughput by Node (bytes/s)",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "id": 5,
          "targets": [{"expr": "sum(rate(container_network_receive_packets_dropped_total{namespace=~\"$namespace\",pod=~\"$pod\"}[2m])) + sum(rate(container_network_transmit_packets_dropped_total{namespace=~\"$namespace\",pod=~\"$pod\"}[2m]))", "refId": "A"}],
          "title": "Pod Packet Drops (rx+tx packets/s)",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["network", "comparison", "inference"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "inference-engine", "value": "inference-engine"},
            "datasource": "Prometheus",
            "definition": "label_values(kube_pod_info, namespace)",
            "includeAll": true,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "query": {"query": "label_values(kube_pod_info, namespace)", "refId": "Prom-NS"},
            "refresh": 1,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {"selected": false, "text": "All", "value": "$__all"},
            "datasource": "Prometheus",
            "definition": "label_values(kube_pod_info{namespace=~\"$namespace\"}, pod)",
            "includeAll": true,
            "label": "Pod",
            "multi": true,
            "name": "pod",
            "query": {"query": "label_values(kube_pod_info{namespace=~\"$namespace\"}, pod)", "refId": "Prom-Pod"},
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "Network Comparison (Multi-node vs Multi-GPU)",
      "uid": "network-comparison",
      "version": 1
    }
