apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-loki-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  loki-logs-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "datasource": "Loki",
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableInfiniteScrolling": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": "Loki",
              "expr": "{namespace=~\"$namespace\", pod=~\"$pod\"}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Kubernetes Logs",
          "type": "logs"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["loki", "logs", "kubernetes"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "inference-engine", "value": "inference-engine"},
            "datasource": "Loki",
            "definition": "label_values(namespace)",
            "includeAll": true,
            "label": "Namespace",
            "multi": false,
            "name": "namespace",
            "query": "label_values(namespace)",
            "refresh": 1,
            "sort": 1,
            "type": "query"
          },
          {
            "current": {"selected": false, "text": "All", "value": "$__all"},
            "datasource": "Loki",
            "definition": "label_values({namespace=~\"$namespace\"}, pod)",
            "includeAll": true,
            "label": "Pod",
            "multi": true,
            "name": "pod",
            "query": "label_values({namespace=~\"$namespace\"}, pod)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-15m", "to": "now"},
      "timezone": "browser",
      "title": "Loki Logs Overview",
      "uid": "loki-logs-overview",
      "version": 1
    }
