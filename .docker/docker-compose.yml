  #     - HUGGINGFACE_HUB_TOKEN=${HF_TOKEN}
  #     - HF_HOME=/root/.cache/huggingface
  #   restart: unless-stopped
  #   gpus: all

  gpu-check:
    image: nvidia/cuda:12.8.1-base-ubuntu24.04
    command: ["nvidia-smi"]
    env_file:
      - .env
    restart: "no"
    gpus: all
