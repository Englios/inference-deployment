services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    command: [
      "--model", "/models/qwen/Qwen3.5-27B-Q3_K_M.gguf",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--n-gpu-layers", "999",
      "--ctx-size", "4096"
    ]
    ports:
      - "10000:8000"
    volumes:
      - ./.hf_cache/unsloth/Qwen3.5-27B-GGUF:/models/qwen:ro
    env_file:
      - .env
    restart: unless-stopped
    gpus: all

  # vllm:
